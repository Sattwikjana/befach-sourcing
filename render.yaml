# Render.com one-click deploy config.
# Push this repo to GitHub, then in Render: "New +" → "Blueprint" → connect repo.
# Render reads this file and provisions a web service + persistent disk.
#
# After it's up, set the secret env vars in the Render dashboard:
#   CJ_API_KEY        — your CJDropshipping key
#   ADMIN_PASSWORD    — admin login password (change from default)
# All other config has safe defaults below.

services:
  - type: web
    name: befach-store
    runtime: node
    plan: starter            # $7/mo, 512MB RAM, always-on
    region: singapore        # closest to India for low latency
    rootDir: server          # package.json lives here
    buildCommand: npm install --production
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true         # redeploy on every git push
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001          # Render sets PORT itself; this is just the fallback
      - key: PROFIT_MARKUP_PERCENT
        # Markup applied to (CJ_wholesale × CJ_FEE_FACTOR + shipping).
        # Currently set to 5% — thin margin, fine for soft-launch / market
        # testing but leaves no buffer for refunds, returns, or the ~2%
        # Razorpay processing fee. Bump this once we have order-volume
        # data to justify a higher number.
        # NOTE: Render dashboard value (if set) overrides this file. Update
        # both places when changing.
        value: "5"
      - key: USD_TO_INR
        value: "85"
      - key: STORE_CURRENCY
        value: INR
      - key: STORE_NAME
        value: Global Shopper
      - key: DEFAULT_SHIP_FROM
        value: CN
      - key: DEFAULT_SHIP_TO
        value: IN
      - key: SHIPPING_METHOD
        value: CJPacket Asia Ordinary
      - key: FALLBACK_SHIPPING_USD
        value: "3.49"
      - key: CJ_FEE_FACTOR
        value: "1.11"
      # Compensates for CJ's freight API undercount. The /freightCalculate
      # endpoint returns ~10–13% lower than what CJ actually bills when the
      # order ships. Multiplier is applied to the API number before it
      # feeds into the price formula. Tune as you observe real CJ
      # invoices vs API quotes.
      - key: SHIPPING_FEE_FACTOR
        value: "1.13"
      # 1 = manual click-through pay, 2 = auto-deduct from CJ wallet,
      # 3 = create only. We ship orders straight from the prefunded CJ
      # wallet — keep $200+ in there at all times via cjdropshipping.com
      # → My CJ → Wallet → Recharge.
      - key: CJ_PAY_TYPE
        value: "2"
      # Secrets — set these in the Render dashboard, not in this file
      - key: CJ_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Razorpay — set both in the Render dashboard.
      # KEY_ID is technically public-ish (the frontend sees it) but treating
      # it as a secret keeps both keys rotatable in one place.
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      # OpenRouter — drives the AI search query parser (Gemini Flash).
      # Without it, /api/store/search/smart silently falls back to plain
      # CJ keyword search (so search keeps working). Hard daily spend cap
      # below prevents runaway usage from a stuck client or scrape.
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_DAILY_CAP_USD
        value: "1.0"
    disk:
      name: befach-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1              # $0.25/GB-month, plenty for years of data
