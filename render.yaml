# Render.com one-click deploy config.
# Push this repo to GitHub, then in Render: "New +" → "Blueprint" → connect repo.
# Render reads this file and provisions a web service + persistent disk.
#
# After it's up, set the secret env vars in the Render dashboard:
#   CJ_API_KEY        — your CJDropshipping key
#   ADMIN_PASSWORD    — admin login password (change from default)
# All other config has safe defaults below.

services:
  - type: web
    name: befach-store
    runtime: node
    plan: starter            # $7/mo, 512MB RAM, always-on
    region: singapore        # closest to India for low latency
    rootDir: server          # package.json lives here
    buildCommand: npm install --production
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true         # redeploy on every git push
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001          # Render sets PORT itself; this is just the fallback
      - key: PROFIT_MARKUP_PERCENT
        # Set to 65% (not 50%) on purpose. CJ's freight API systematically
        # undercounts the shipping cost shown on their dropshipper page —
        # by ~10–13% on the products we sampled. Setting markup to 65 over
        # the API-derived cost yields a real ~50% increase over what CJ
        # shows you as the all-in dropshipper total. Tune up/down here as
        # we observe more data points across the catalog.
        value: "65"
      - key: USD_TO_INR
        value: "85"
      - key: STORE_CURRENCY
        value: INR
      - key: STORE_NAME
        value: Befach
      - key: DEFAULT_SHIP_FROM
        value: CN
      - key: DEFAULT_SHIP_TO
        value: IN
      - key: SHIPPING_METHOD
        value: CJPacket Asia Ordinary
      - key: FALLBACK_SHIPPING_USD
        value: "3.49"
      - key: CJ_FEE_FACTOR
        value: "1.11"
      # Secrets — set these in the Render dashboard, not in this file
      - key: CJ_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Razorpay — set both in the Render dashboard.
      # KEY_ID is technically public-ish (the frontend sees it) but treating
      # it as a secret keeps both keys rotatable in one place.
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
    disk:
      name: befach-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1              # $0.25/GB-month, plenty for years of data
