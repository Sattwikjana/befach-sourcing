<?xml version="1.0" encoding="UTF-8"?>
<!-- GCOM favicon — square crop showing the "G" with the gold accent.
     Uses Archivo Black, falls back to system sans-serif. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="GCOM">
  <rect width="64" height="64" fill="#FAF8F2"/>
  <text x="32" y="50" text-anchor="middle"
        font-family="Archivo Black, Inter, system-ui, sans-serif"
        font-size="60" font-weight="900"
        fill="#0A0A0A">G</text>
  <rect x="34" y="32" width="6" height="16" fill="#B89456"/>
</svg>
